<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | TalentBridge</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}">
</head>
<body>

<div class="register-container">

    <div class="form-card">

        <h1>Edit Profile</h1>
        <p>Keep your profile up to date.</p>

        <form action="/student/update-profile" method="POST">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" value="{{ student[1] }}" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ student[2] }}" readonly>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" value="{{ student[3] }}" required>
            </div>

            <div class="form-group">
                <label>College Name</label>
                <input type="text" name="college" value="{{ student[5] or '' }}">
            </div>

            <div class="form-group">
                <label>Degree</label>
                <input type="text" name="degree" value="{{ student[6] or '' }}">
            </div>

            <button type="submit" class="btn">
                Save Changes
            </button>

        </form>

    </div>

</div>

</body>
</html>
