{% extends "base.html" %}

{% block title %}Edit Job | TalentBridge{% endblock %}

{% block content %}

<section class="py-5">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-5">

<div class="text-center mb-5">

<h2 class="fw-bold">
<i class="fa-solid fa-pen-to-square text-primary"></i>
Edit Job
</h2>

<p class="text-muted">
Update your job posting details.
</p>

</div>

<form action="/update-job/{{ job[0] }}" method="POST">

<div class="row">

<div class="col-md-6 mb-4">

<label class="form-label">Company Name</label>

<input
type="text"
class="form-control"
name="company_name"
value="{{ job[1] }}"
required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">Job Title</label>

<input
type="text"
class="form-control"
name="job_title"
value="{{ job[2] }}"
required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">Location</label>

<input
type="text"
class="form-control"
name="location"
value="{{ job[3] }}"
required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">Salary</label>

<input
type="text"
class="form-control"
name="salary"
value="{{ job[4] }}"
required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">Job Type</label>

<input
type="text"
class="form-control"
name="job_type"
value="{{ job[5] }}"
required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">Experience</label>

<input
type="text"
class="form-control"
name="experience"
value="{{ job[6] }}"
required>

</div>

<div class="col-12 mb-4">

<label class="form-label">Job Description</label>

<textarea
class="form-control"
rows="5"
name="description"
required>{{ job[7] }}</textarea>

</div>

<div class="col-12 mb-4">

<label class="form-label">Required Skills</label>

<textarea
class="form-control"
rows="4"
name="skills"
required>{{ job[8] }}</textarea>

</div>

<div class="col-12">

<button
type="submit"
class="btn btn-primary w-100 rounded-pill py-3">

<i class="fa-solid fa-floppy-disk"></i>

Update Job

</button>

</div>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</section>

{% endblock %}
