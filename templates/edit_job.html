<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job | TalentBridge</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="dashboard">

<h1>Edit Job</h1>

<form action="/update-job/{{ job[0] }}" method="POST">

    <input
        type="text"
        name="company_name"
        value="{{ job[1] }}"
        required
    >

    <input
        type="text"
        name="job_title"
        value="{{ job[2] }}"
        required
    >

    <input
        type="text"
        name="location"
        value="{{ job[3] }}"
        required
    >

    <input
        type="text"
        name="salary"
        value="{{ job[4] }}"
        required
    >

    <input
        type="text"
        name="job_type"
        value="{{ job[5] }}"
        required
    >

    <input
        type="text"
        name="experience"
        value="{{ job[6] }}"
        required
    >

    <textarea
        name="description"
        rows="5"
        required>{{ job[7] }}</textarea>

    <textarea
        name="skills"
        rows="4"
        required>{{ job[8] }}</textarea>

    <br><br>

    <button type="submit">
        Update Job
    </button>

</form>

</div>

</body>
</html>
