{% extends "base.html" %}

{% block title %}Recruiter Registration | TalentBridge{% endblock %}

{% block content %}

<section class="auth-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-6 col-md-8">

<div class="auth-card">

<div class="text-center mb-4">

<i class="fa-solid fa-building-user fa-4x text-primary mb-3"></i>

<h2>Create Recruiter Account</h2>

<p class="text-muted">
Register your company and start hiring talented students.
</p>

</div>

<form action="/recruiter/register" method="POST">

<div class="mb-3">

<label class="form-label">
Company Name
</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-building"></i>
</span>

<input
type="text"
name="company_name"
class="form-control"
placeholder="Enter company name"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">
Recruiter Name
</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-user-tie"></i>
</span>

<input
type="text"
name="recruiter_name"
class="form-control"
placeholder="Enter recruiter name"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">
Email Address
</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-envelope"></i>
</span>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter company email"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">
Phone Number
</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-phone"></i>
</span>

<input
type="text"
name="phone"
class="form-control"
placeholder="Enter phone number"
required>

</div>

</div>

<div class="mb-4">

<label class="form-label">
Password
</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>

<input
type="password"
name="password"
class="form-control"
placeholder="Create a password"
required>

</div>

</div>

<button type="submit" class="btn btn-primary w-100">

<i class="fa-solid fa-user-plus"></i>

Create Recruiter Account

</button>

</form>

<hr>

<div class="text-center">

<p class="mb-0">

Already have a recruiter account?

<a href="/recruiter/login" class="fw-bold">

Login Here

</a>

</p>

</div>

</div>

</div>

</div>

</div>

</section>

{% endblock %}
